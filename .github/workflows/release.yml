name: Release

# Tag a release: `git tag v0.1.0 && git push --tags`
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build, bundle, and publish the desktop app for every platform via tauri-action.
  desktop:
    name: Desktop (${{ matrix.os }} ${{ matrix.args }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebView/build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        working-directory: crates/hlu-desktop
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. Requires the repo secret TAURI_SIGNING_PRIVATE_KEY (contents of the
          # minisign private key from `npm run tauri signer generate`). The key was generated
          # without a password, so the password secret may be unset/empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/hlu-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Homelab Utils ${{ github.ref_name }}"
          # Published (not draft) so the `releases/latest/download/latest.json` updater endpoint
          # serves it. tauri-action generates + uploads latest.json (createUpdaterArtifacts is on).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Build and attach the standalone discovery CLI for each platform.
  cli:
    name: CLI (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p hlu-discover-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="hlu-discover"
          src="target/${{ matrix.target }}/release/${bin}"
          [ -f "${src}.exe" ] && src="${src}.exe"
          out="hlu-discover-${{ matrix.target }}"
          [ -f "${src}" ] && cp "${src}" "${out}$([[ "${src}" == *.exe ]] && echo .exe)"
          ls -la hlu-discover-*
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: hlu-discover-${{ matrix.target }}*
